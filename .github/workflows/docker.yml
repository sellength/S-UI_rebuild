name: Docker Image CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
   
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      run: |
        cd frontend
        npm install --legacy-peer-deps
        npm run build
        cd ..
        rm -rf backend/web/html/*
        mkdir -p backend/web/html
        cp -r frontend/dist/* backend/web/html/

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true

    - name: Build Backend Binary
      run: |
        cd backend
        go mod tidy
        # CGO_ENABLED=0 ensuring pure Go execution on Alpine Linux container
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o sui main.go

    - name: Build Sing-box Binary
      run: |
        # Clone official sing-box source codes at version v1.12.0
        git clone -b v1.12.0 https://github.com/SagerNet/sing-box sing-box-src
        cd sing-box-src
        # Build sing-box from source with all essential feature tags
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags with_quic,with_grpc,with_wireguard,with_ech,with_utls,with_reality_server,with_acme,with_v2ray_api,with_clash_api,with_gvisor \
          -v -trimpath -ldflags "-s -w -buildid=" \
          -o ../core/sing-box ./cmd/sing-box
        cd ..
        chmod +x core/sing-box

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ github.repository_owner }}/s-ui_rebuild
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/amd64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}